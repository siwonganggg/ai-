v<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 문제 생성기</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
            padding: 50px;
        }

        textarea {
            width: 80%;
            height: 150px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #result {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>

    <h1>🧠 AI 문제 생성기</h1>

    <textarea id="inputText" placeholder="여기에 공부 내용을 입력하세요..."></textarea><br>

    <button onclick="generateQuestion()">문제 생성하기</button>

    <div id="result">
        <h3>문제 결과</h3>
        <p id="output">여기에 문제가 생성됩니다.</p>
    </div>

    <script>
        function generateQuestion() {
            const text = document.getElementById("inputText").value;

            if (text.trim() === "") {
                alert("내용을 입력하세요!");
                return;
            }

            // 임시 AI (진짜 AI 대신 테스트용)
            const question = "다음 내용에 대한 핵심 질문은?\n\n" + text;

            document.getElementById("output").innerText = question;
        }
    </script>

</body>
</html>
